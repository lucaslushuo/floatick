name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.7

jobs:
  test:
    name: Analyze and test
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Flutter
        shell: bash
        run: |
          git clone \
            --branch "$FLUTTER_VERSION" \
            --depth 1 \
            https://github.com/flutter/flutter.git \
            "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS release app
        run: flutter build macos --release

      - name: Verify app architectures
        shell: bash
        run: |
          app_path="build/macos/Build/Products/Release/Floatick.app"
          executable_name=$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleExecutable' \
            "$app_path/Contents/Info.plist")
          architectures=$(lipo -archs "$app_path/Contents/MacOS/$executable_name")

          if [[ "$architectures" != *arm64* || "$architectures" != *x86_64* ]]; then
            echo "Expected a universal app, found: $architectures" >&2
            exit 1
          fi
