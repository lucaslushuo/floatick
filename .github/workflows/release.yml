name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.7
  PRODUCT_NAME: Floatick

jobs:
  release:
    name: Build and publish unsigned DMG
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        shell: bash
        run: |
          app_version=$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)
          expected_tag="v$app_version"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $app_version." >&2
            exit 1
          fi
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Install Flutter
        shell: bash
        run: |
          git clone \
            --branch "$FLUTTER_VERSION" \
            --depth 1 \
            https://github.com/flutter/flutter.git \
            "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Verify source
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze
          flutter test

      - name: Build release app
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          flutter build macos \
            --release \
            --build-name "$APP_VERSION" \
            --build-number "$GITHUB_RUN_NUMBER"

      - name: Verify app architectures
        shell: bash
        run: |
          app_path="build/macos/Build/Products/Release/$PRODUCT_NAME.app"
          executable_name=$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleExecutable' \
            "$app_path/Contents/Info.plist")
          architectures=$(lipo -archs "$app_path/Contents/MacOS/$executable_name")

          if [[ "$architectures" != *arm64* || "$architectures" != *x86_64* ]]; then
            echo "Expected a universal app, found: $architectures" >&2
            exit 1
          fi

      - name: Create DMG and checksum
        id: package
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        shell: bash
        run: |
          artifact_directory="$RUNNER_TEMP/artifacts"
          dmg_name="$PRODUCT_NAME-$APP_VERSION-macos-universal.dmg"
          dmg_path="$artifact_directory/$dmg_name"

          tool/release/create_dmg.sh \
            "build/macos/Build/Products/Release/$PRODUCT_NAME.app" \
            "$dmg_path" \
            "$PRODUCT_NAME"

          (
            cd "$artifact_directory"
            shasum -a 256 "$dmg_name" > "$dmg_name.sha256"
          )

          echo "dmg_name=$dmg_name" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DMG_NAME: ${{ steps.package.outputs.dmg_name }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
        shell: bash
        run: |
          notes_path="$RUNNER_TEMP/release-notes.md"
          cat > "$notes_path" <<'EOF'
          ## 温馨提示

          Floatick 目前仍处于早期版本。第一次打开时，如果 macOS 需要额外
          确认，请先尝试打开一次 Floatick，然后前往“系统设置”→
          “隐私与安全”，在“安全性”区域点击“仍要打开”。

          完成一次确认后，后续就可以正常启动。下载页面同时提供 SHA-256
          校验文件。
          EOF

          release_flags=(
            --verify-tag
            --generate-notes
            --notes-file "$notes_path"
            --title "$PRODUCT_NAME $GITHUB_REF_NAME"
          )
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            "$DMG_PATH#$DMG_NAME" \
            "$DMG_PATH.sha256#$DMG_NAME.sha256" \
            "${release_flags[@]}"
